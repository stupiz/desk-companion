; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
# Default target is compile-only to avoid accidental uploads.
default_envs = desk_companion
boards_dir = boards

[env:desk_companion]
platform = espressif32
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200
upload_speed = 921600
monitor_filters = time
lib_deps =
    sensirion/Sensirion I2C SCD4x@^1.1.0
    adafruit/Adafruit SGP40 Sensor@^1.1.4
build_flags =
    -D CORE_DEBUG_LEVEL=3

# Use this only when you actually need to flash.
# /Users/maguro/.platformio/penv/bin/pio run -e desk_companion_upload -t upload --upload-port /dev/cu.yourport
[env:desk_companion_upload]
extends = env:desk_companion
upload_protocol = esptool

[env:desk_companion_lilygo_s3]
extends = env:desk_companion
board = lilygo-t-display-s3

[env:desk_companion_lilygo_s3_upload]
extends = env:desk_companion_lilygo_s3
upload_protocol = esptool

[env:desk_companion_t_display_long]
extends = env:desk_companion
board = T-Display-Long
build_flags =
    ${env:desk_companion.build_flags}
    -DDESKCOMPANION_BOARD_T_DISPLAY_S3_LONG=1

[env:desk_companion_t_display_long_upload]
extends = env:desk_companion_t_display_long
upload_protocol = esptool

; ===== SAFE USAGE =====
; - Default: compile only
;   /Users/maguro/.platformio/penv/bin/pio run -e desk_companion
; - Flash: run only on target device
;   /Users/maguro/.platformio/penv/bin/pio run -e desk_companion_upload -t upload --upload-port /dev/cu.<port>
; - LilyGO T-Display S3 compile
;   /Users/maguro/.platformio/penv/bin/pio run -e desk_companion_lilygo_s3
; - LilyGO T-Display S3 flash
;   /Users/maguro/.platformio/penv/bin/pio run -e desk_companion_lilygo_s3_upload -t upload --upload-port /dev/cu.<port>
; - LilyGO T-Display S3 Long compile
;   /Users/maguro/.platformio/penv/bin/pio run -e desk_companion_t_display_long
; - LilyGO T-Display S3 Long flash
;   /Users/maguro/.platformio/penv/bin/pio run -e desk_companion_t_display_long_upload -t upload --upload-port /dev/cu.<port>
